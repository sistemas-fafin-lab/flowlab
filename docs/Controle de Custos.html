/* ════════════════════════════════════════════════════════════════════════
   ICON HELPER — renders Lucide SVG by name as a React component
   (mirrors lucide-react usage in the real codebase)
   ═══════════════════════════════════════════════════════════════════════ */
const Icon = ({ name, className = "w-4 h-4", strokeWidth = 2, ...rest }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const node = ref.current;
    node.innerHTML = '';
    const i = document.createElement('i');
    i.setAttribute('data-lucide', name);
    node.appendChild(i);
    window.lucide.createIcons({ attrs: { 'stroke-width': strokeWidth }, nameAttr: 'data-lucide' });
  }, [name, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} {...rest}/>;
};

  const addExam = (data) => setExams(prev => [{ ...data, id: 'e' + Date.now() }, ...prev]);

  return { exams, payors, loading, addExam, updateExam, deleteExam };
};

/* ════════════════════════════════════════════════════════════════════════
   TELA 2 — ExamFormModal (with expandable Indirect Cost composer)
   ═══════════════════════════════════════════════════════════════════════ */
const IndirectComposer = ({ items, onChange }) => {
  const [open, setOpen] = useState(false);
  const total = items.reduce((s, it) => s + (Number(it.value) || 0), 0);

  const update = (id, key, val) => onChange(items.map(it => it.id === id ? { ...it, [key]: val } : it));
  const remove = (id) => onChange(items.filter(it => it.id !== id));
  const add = () => onChange([...items, { id: 'i' + Date.now(), label: '', value: 0 }]);

  return (
    <div className="rounded-xl border border-gray-200 dark:border-gray-700 bg-slate-50/60 dark:bg-gray-900/30 overflow-hidden">
      <button type="button" onClick={() => setOpen(o => !o)}
        className="w-full flex items-center justify-between px-4 py-3 hover:bg-slate-100/60 dark:hover:bg-gray-800/40 transition-colors">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg bg-purple-500/10 text-purple-600 dark:text-purple-400 flex items-center justify-center">
            <Icon name="layers" className="w-4 h-4"/>
          </div>
          <div className="text-left">
            <div className="text-sm font-semibold text-gray-800 dark:text-gray-100">Composição do Custo Indireto</div>
            <div className="text-xs text-gray-500 dark:text-gray-400">{items.length} {items.length === 1 ? 'item' : 'itens'} · Soma: <span className="font-semibold tabular-nums">{formatBRL(total)}</span></div>
          </div>
        </div>
        <Icon name={open ? 'chevron-up' : 'chevron-down'} className="w-4 h-4 text-gray-400"/>
      </button>

      {open && (
        <div className="px-4 pb-4 pt-1 animate-slide-up">
          <div className="space-y-2">
            {items.map((it) => (
              <div key={it.id} className="flex items-center gap-2">
                <input
                  value={it.label}
                  onChange={(e) => update(it.id, 'label', e.target.value)}
                  placeholder="Ex: Depreciação de equipamento"
                  className="flex-1 px-3 py-2 text-sm rounded-lg bg-white dark:bg-gray-900/50
                    border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30"
                />
                <div className="relative w-36">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 pointer-events-none">R$</span>
                  <input
                    type="number" step="0.01"
                    value={it.value}
                    onChange={(e) => update(it.id, 'value', parseFloat(e.target.value) || 0)}
                    className="w-full pl-9 pr-2 py-2 text-sm tabular-nums rounded-lg bg-white dark:bg-gray-900/50
                      border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30"
                  />
                </div>
                <IconButton icon="x" tone="danger" onClick={() => remove(it.id)} title="Remover"/>
              </div>
            ))}
          </div>
          <button type="button" onClick={add}
            className="mt-3 inline-flex items-center gap-1.5 text-xs font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300">
            <Icon name="plus" className="w-3.5 h-3.5"/> Adicionar item
          </button>

          <div className="mt-4 flex items-center justify-between px-3 py-2.5 rounded-lg bg-blue-50 dark:bg-blue-500/10 border border-blue-100 dark:border-blue-500/20">
            <span className="text-xs font-bold uppercase tracking-wider text-blue-700 dark:text-blue-300">Total Indireto</span>
            <span className="text-sm font-bold tabular-nums text-blue-900 dark:text-blue-200">{formatBRL(total)}</span>
          </div>
        </div>
      )}
    </div>
  );
};

const ExamFormModal = ({ open, exam, onClose, onSave }) => {
  const [form, setForm] = useState({
    code: '', name: '', location: '', direct: 0, indirect: 0, indirectItems: [],
  });

  useEffect(() => {
    if (exam) {
      setForm({
        code: exam.code, name: exam.name, location: exam.location,
        direct: exam.direct, indirect: exam.indirect,
        indirectItems: exam.indirectItems || [],
      });
    } else {
      setForm({ code: '', name: '', location: '', direct: 0, indirect: 0, indirectItems: [] });
    }
  }, [exam, open]);

  // Auto-sync indirect total from composer items
  const indirectFromItems = useMemo(
    () => form.indirectItems.reduce((s, it) => s + (Number(it.value) || 0), 0),
    [form.indirectItems]
  );
  useEffect(() => {
    if (form.indirectItems.length > 0) {
      setForm(f => ({ ...f, indirect: +indirectFromItems.toFixed(2) }));
    }
  }, [indirectFromItems]);

  if (!open) return null;

  const total = (Number(form.direct) || 0) + (Number(form.indirect) || 0);

  const handleSubmit = (e) => {
    e.preventDefault();
    onSave(form);
  };

  return (
    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in"
         onClick={onClose}>
      <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl shadow-slate-900/20 w-full max-w-2xl max-h-[92vh] flex flex-col animate-scale-in"
           onClick={(e) => e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-6 py-5 border-b border-gray-100 dark:border-gray-700">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 text-white flex items-center justify-center shadow-md shadow-blue-500/25">

            </div>
            <div>
              <h2 className="text-lg font-semibold text-gray-900 dark:text-gray-100">
                {exam ? 'Editar exame' : 'Novo exame'}
              </h2>
              <p className="text-xs text-gray-500 dark:text-gray-400">
                Cadastre custo direto e composição do custo indireto.
              </p>
            </div>
          </div>
          <button onClick={onClose} className="p-2 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 dark:hover:text-gray-200 transition-colors">
            <Icon name="x" className="w-5 h-5"/>
          </button>
        </div>

        {/* Body — scrollable */}
        <form onSubmit={handleSubmit} className="flex-1 overflow-y-auto">
          <div className="px-6 py-5 space-y-5">
            {/* Base */}
            <section className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <Field label="Código" required>
                <TextInput value={form.code} onChange={(e) => setForm(f => ({...f, code: e.target.value}))} placeholder="HMG-001"/>
              </Field>
              <Field label="Nome do exame" required>
                <TextInput value={form.name} onChange={(e) => setForm(f => ({...f, name: e.target.value}))} placeholder="Hemograma Completo"/>
              </Field>
              <Field label="Local de realização" required>
                <TextInput value={form.location} onChange={(e) => setForm(f => ({...f, location: e.target.value}))} placeholder="Hematologia"/>
              </Field>
            </section>

            {/* Custos Diretos */}
            <section>
              <h3 className="text-[11px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Custos Diretos</h3>
              <div className="rounded-xl border border-gray-200 dark:border-gray-700 bg-slate-50/60 dark:bg-gray-900/30 p-4">
                <Field label="Materiais diretos" hint="Reagentes, descartáveis e insumos consumidos especificamente neste exame.">
                  <TextInput
                    type="number" step="0.01" prefix="R$"
                    value={form.direct}
                    onChange={(e) => setForm(f => ({...f, direct: parseFloat(e.target.value) || 0}))}
                  />
                </Field>
              </div>
            </section>

            {/* Custos Indiretos */}
            <section>
              <h3 className="text-[11px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Custos Indiretos</h3>
              <IndirectComposer
                items={form.indirectItems}
                onChange={(items) => setForm(f => ({...f, indirectItems: items}))}
              />
              {form.indirectItems.length === 0 && (
                <div className="mt-3">
                  <Field label="Valor estimado (custo indireto)" hint="Preencha o valor estimado, ou expanda acima para detalhar.">
                    <TextInput
                      type="number" step="0.01" prefix="R$"
                      value={form.indirect}
                      onChange={(e) => setForm(f => ({...f, indirect: parseFloat(e.target.value) || 0}))}
                    />
                  </Field>
                </div>
              )}
            </section>

            {/* Total Summary */}
            <div className="rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 p-5 text-white shadow-lg shadow-blue-500/30">
              <div className="text-[11px] font-bold uppercase tracking-wider text-blue-100">Custo Total (Direto + Indireto)</div>
              <div className="mt-1 text-3xl font-bold tabular-nums font-display">{formatBRL(total)}</div>
              <div className="mt-2 flex items-center gap-4 text-xs text-blue-50">

          </div>
        </form>
      </div>
    </div>
  );
};

   TELA 4 — Analytics: Filtros Proteus-style + Tabela de Rentabilidade
   ═══════════════════════════════════════════════════════════════════════ */
const StatCard = ({ icon, label, value, sub, tone = 'blue' }) => {
  const tones = {
    blue:    'from-blue-500/10 to-indigo-500/10 text-blue-600 dark:text-blue-400 border-blue-500/20',
    green:   'from-emerald-500/10 to-green-500/10 text-emerald-600 dark:text-emerald-400 border-emerald-500/20',
    red:     'from-red-500/10 to-rose-500/10 text-red-600 dark:text-red-400 border-red-500/20',
    amber:   'from-amber-500/10 to-orange-500/10 text-amber-600 dark:text-amber-400 border-amber-500/20',
  };
  return (
    <div className="rounded-2xl border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-800 p-5 shadow-sm">
      <div className="flex items-start justify-between">
        <div>
          <div className="text-[11px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{label}</div>
          <div className="mt-1 text-2xl font-bold text-gray-900 dark:text-white tabular-nums font-display">{value}</div>
          {sub && <div className="text-xs text-gray-500 dark:text-gray-400 mt-1">{sub}</div>}
        </div>
        <div className={`w-10 h-10 rounded-xl bg-gradient-to-br border flex items-center justify-center ${tones[tone]}`}>
          <Icon name={icon} className="w-5 h-5"/>
        </div>
      </div>
    </div>
  );
};

const AdvancedFilter = ({ field, op, val, val2, onChange, onRemove, fields }) => {
  const ops = [
    { v: 'gt', label: 'Maior que' },
    { v: 'lt', label: 'Menor que' },
    { v: 'eq', label: 'Igual a' },
    { v: 'between', label: 'Entre' },
  ];
  return (
    <div className="flex flex-wrap items-center gap-2 px-3 py-2 rounded-xl bg-slate-100/70 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700">
      <select value={field} onChange={(e) => onChange({ field: e.target.value, op, val, val2 })}
        className="px-2.5 py-1.5 text-xs font-medium rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500">
        {fields.map(f => <option key={f.k} value={f.k}>{f.label}</option>)}
      </select>
      <select value={op} onChange={(e) => onChange({ field, op: e.target.value, val, val2 })}
        className="px-2.5 py-1.5 text-xs font-medium rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500">
        {ops.map(o => <option key={o.v} value={o.v}>{o.label}</option>)}
      </select>
      <input type="number" step="0.01" value={val} onChange={(e) => onChange({ field, op, val: e.target.value, val2 })}
        className="w-24 px-2 py-1.5 text-xs tabular-nums rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500"/>
      {op === 'between' && (
        <>
          <span className="text-xs text-gray-400">e</span>
          <input type="number" step="0.01" value={val2} onChange={(e) => onChange({ field, op, val, val2: e.target.value })}
            className="w-24 px-2 py-1.5 text-xs tabular-nums rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500"/>
        </>
      )}
      <button onClick={onRemove} className="ml-1 p-1 rounded text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10">
        <Icon name="x" className="w-3.5 h-3.5"/>
      </button>
    </div>
  );
};

const InfoTooltip = ({ children, content }) => {
  const [open, setOpen] = useState(false);
  return (
    <span className="relative inline-flex" onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}>
      {children}
      {open && (
        <span className="absolute bottom-full right-0 mb-2 w-64 p-3 rounded-xl bg-gray-900 dark:bg-gray-700 text-white text-xs leading-relaxed shadow-xl z-30 animate-fade-in">
          {content}
          <span className="absolute -bottom-1 right-3 w-2 h-2 bg-gray-900 dark:bg-gray-700 rotate-45"/>
        </span>
      )}
    </span>
  );
};

const AnalyticsScreen = ({ exams, payors }) => {
  const [filters, setFilters] = useState([
    { field: 'margin', op: 'lt', val: 0, val2: 0 },
  ]);
  const [payorFilter, setPayorFilter] = useState('Saldo de Caixa');
  const [dateFrom, setDateFrom] = useState('2026-04-01');
  const [dateTo, setDateTo] = useState('2026-04-30');

  const fields = [
    { k: 'cost',    label: 'Custo Total' },
    { k: 'revenue', label: 'Receita' },
    { k: 'profit',  label: 'Lucro/Prejuízo' },
    { k: 'margin',  label: 'Margem (%)' },
  ];

  const examMap = useMemo(() => Object.fromEntries(exams.map(e => [e.id, e])), [exams]);

  // Build rentabilidade rows
  const rows = useMemo(() => {
    const filteredP = payors.filter(p => payorFilter === 'all' || p.payor === payorFilter);
    return filteredP.map(p => {
      const ex = examMap[p.examId];
      if (!ex) return null;
      const cost = ex.direct + ex.indirect;
      const revenue = p.price;
      const profit = revenue - cost;
      const margin = revenue > 0 ? ((revenue - cost) / revenue) * 100 : 0;
      const ratio = revenue > 0 ? (cost / revenue) * 100 : 0; // > 100% = prejuízo
      return { id: p.id, exam: ex, cost, revenue, profit, margin, ratio, payor: p.payor, table: p.table };
    }).filter(Boolean);
  }, [payors, examMap, payorFilter]);

  // Apply advanced filters
  const filteredRows = useMemo(() => {
    return rows.filter(r => filters.every(f => {
      const v = r[f.field];
      const a = parseFloat(f.val);
      const b = parseFloat(f.val2);
      if (Number.isNaN(a) && f.op !== 'between') return true;
      switch (f.op) {
        case 'gt': return v > a;
        case 'lt': return v < a;
        case 'eq': return Math.abs(v - a) < 0.01;
        case 'between':
          if (Number.isNaN(a) || Number.isNaN(b)) return true;
          return v >= Math.min(a, b) && v <= Math.max(a, b);
        default: return true;
      }
    }));
  }, [rows, filters]);

  // Summary metrics
  const summary = useMemo(() => {
    const totalCost = filteredRows.reduce((s, r) => s + r.cost, 0);
    const totalRev = filteredRows.reduce((s, r) => s + r.revenue, 0);
    const totalProfit = totalRev - totalCost;
    const lossCount = filteredRows.filter(r => r.profit < 0).length;
    return { totalCost, totalRev, totalProfit, lossCount, count: filteredRows.length };
  }, [filteredRows]);

  return (
    <div className="space-y-5">
      {/* Stats */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <StatCard icon="layers"        label="Exames analisados" value={summary.count}                              sub={`Período: abr/2026`} tone="blue"/>
        <StatCard icon="trending-up"   label="Receita total"      value={formatBRL(summary.totalRev)}                sub="Soma das fontes pagadoras" tone="green"/>
        <StatCard icon="dollar-sign"   label="Custo total"        value={formatBRL(summary.totalCost)}               sub="Direto + indireto" tone="amber"/>
        <StatCard icon="alert-triangle" label="Exames com prejuízo" value={summary.lossCount}                        sub={summary.count ? `${((summary.lossCount/summary.count)*100).toFixed(0)}% da carteira` : '—'} tone={summary.lossCount > 0 ? 'red' : 'green'}/>
      </div>

      {/* Filters card */}
      <div className="rounded-2xl border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-800 p-5 shadow-sm">
        <div className="flex items-start justify-between flex-wrap gap-3 mb-4">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 text-white flex items-center justify-center shadow-md shadow-blue-500/25">
              <Icon name="sliders-horizontal" className="w-4 h-4"/>
            </div>
            <div>
              <h2 className="text-base font-semibold text-gray-900 dark:text-gray-100">Filtros avançados</h2>
              <p className="text-xs text-gray-500 dark:text-gray-400">Combine condições para isolar cenários de rentabilidade.</p>
            </div>
          </div>
          <PrimaryButton icon="download">Exportar relatório</PrimaryButton>
        </div>

        {/* Base filters: payor + date range */}
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
          <Field label="Fonte pagadora">
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
                <Icon name="building-2" className="w-4 h-4"/>
              </span>
              <select value={payorFilter} onChange={(e) => setPayorFilter(e.target.value)}
                className="w-full pl-9 pr-9 py-2.5 text-sm rounded-xl bg-white dark:bg-gray-900/50
                  border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 appearance-none">
                <option value="all">Todos os convênios</option>
                {Array.from(new Set(payors.map(p => p.payor))).map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">
                <Icon name="chevron-down" className="w-4 h-4"/>
              </span>
            </div>
          </Field>
          <Field label="Data inicial">
            <TextInput icon="calendar" type="date" value={dateFrom} onChange={(e) => setDateFrom(e.target.value)}/>
          </Field>
          <Field label="Data final">
            <TextInput icon="calendar" type="date" value={dateTo} onChange={(e) => setDateTo(e.target.value)}/>
          </Field>
        </div>

        {/* Advanced (Proteus-style) filters */}
        <div>
          <div className="text-[11px] font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">Condições</div>
          <div className="flex flex-wrap gap-2">
            {filters.map((f, i) => (
              <AdvancedFilter
                key={i} {...f} fields={fields}
                onChange={(nf) => setFilters(arr => arr.map((x, j) => j === i ? nf : x))}
                onRemove={() => setFilters(arr => arr.filter((_, j) => j !== i))}
              />
            ))}
            <button
              onClick={() => setFilters(arr => [...arr, { field: 'cost', op: 'gt', val: 0, val2: 0 }])}
              className="inline-flex items-center gap-1.5 px-3 py-2 rounded-xl border border-dashed border-blue-300 dark:border-blue-700
                text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-500/10 text-xs font-semibold transition-colors">
              <Icon name="plus" className="w-3.5 h-3.5"/> Adicionar condição
            </button>
          </div>
        </div>
      </div>

      {/* Table */}
      <div className="rounded-2xl border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-800 shadow-sm overflow-hidden">
        <div className="px-5 py-4 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between flex-wrap gap-2">
          <div>
            <h3 className="text-base font-semibold text-gray-900 dark:text-gray-100">Pré-visualização de rentabilidade</h3>
            <p className="text-xs text-gray-500 dark:text-gray-400">Linhas em vermelho indicam <strong>prejuízo</strong> (Custo / Receita &gt; 100%).</p>
          </div>
          <div className="flex items-center gap-2 text-xs">
            <Badge tone="green" dot>Lucro</Badge>
            <Badge tone="amber" dot>Margem &lt; 10%</Badge>
            <Badge tone="red" dot>Prejuízo</Badge>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 dark:bg-gray-900/40 text-[11px] uppercase tracking-wider text-slate-500 dark:text-slate-400">
              <tr>
                <th className="px-5 py-3 text-left font-bold">Exame</th>
                <th className="px-5 py-3 text-left font-bold">Pagador / Tabela</th>
                <th className="px-5 py-3 text-right font-bold">Custo Total</th>
                <th className="px-5 py-3 text-right font-bold">Receita</th>
                <th className="px-5 py-3 text-right font-bold">Lucro/Prejuízo</th>
                <th className="px-5 py-3 text-right font-bold">Margem</th>
                <th className="px-5 py-3 text-center font-bold w-24">Status</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100 dark:divide-gray-700/60">
              {filteredRows.map(r => {
                const isLoss = r.profit < 0;
                const isThin = !isLoss && r.margin < 10;
                return (
                  <tr key={r.id}
                      className={`transition-colors ${isLoss
                        ? 'bg-red-50/40 dark:bg-red-500/[.05] hover:bg-red-50/70 dark:hover:bg-red-500/[.08]'
                        : 'hover:bg-blue-50/40 dark:hover:bg-blue-500/[.04]'}`}>
                    <td className="px-5 py-3.5">
                      <div className="flex items-center gap-2">
                        <div className="font-semibold text-gray-800 dark:text-gray-100">{r.exam.name}</div>
                        {isLoss && (
                          <InfoTooltip content="Exames podem ser mantidos no portfólio mesmo com prejuízo unitário, por integrarem painéis lucrativos maiores ou contratos de exclusividade. Avalie em conjunto.">
                            <span className="text-amber-500 cursor-help inline-flex"><Icon name="info" className="w-3.5 h-3.5"/></span>
                          </InfoTooltip>
                        )}
                      </div>
                      <div className="text-xs text-gray-500 dark:text-gray-400 font-mono">{r.exam.code} · {r.exam.location}</div>
                    </td>
                    <td className="px-5 py-3.5">
                      <div className="text-sm font-medium text-gray-800 dark:text-gray-100">{r.payor}</div>
                      <div className="text-xs text-gray-500 dark:text-gray-400">{r.table}</div>
                    </td>
                    <td className="px-5 py-3.5 text-right tabular-nums text-gray-700 dark:text-gray-200">{formatBRL(r.cost)}</td>
                    <td className="px-5 py-3.5 text-right tabular-nums text-gray-700 dark:text-gray-200">{formatBRL(r.revenue)}</td>
                    <td className={`px-5 py-3.5 text-right tabular-nums font-bold
                      ${isLoss ? 'text-red-600 dark:text-red-400' : 'text-emerald-600 dark:text-emerald-400'}`}>
                      {isLoss ? '−' : '+'}{formatBRL(Math.abs(r.profit))}
                    </td>
                    <td className={`px-5 py-3.5 text-right tabular-nums font-semibold
                      ${isLoss ? 'text-red-600 dark:text-red-400' : isThin ? 'text-amber-600 dark:text-amber-400' : 'text-emerald-600 dark:text-emerald-400'}`}>
                      {formatPct(r.margin)}
                    </td>
                    <td className="px-5 py-3.5 text-center">
                      {isLoss
                        ? <Badge tone="red" dot>Prejuízo</Badge>
                        : isThin
                          ? <Badge tone="amber" dot>Margem baixa</Badge>
                          : <Badge tone="green" dot>Lucro</Badge>}
                    </td>
                  </tr>
                );
              })}
              {filteredRows.length === 0 && (
                <tr>
                  <td colSpan={7} className="px-5 py-12 text-center text-sm text-gray-500 dark:text-gray-400">
                    Nenhum resultado para os filtros aplicados.
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
        <div className="px-5 py-3 border-t border-gray-100 dark:border-gray-700 bg-slate-50/50 dark:bg-gray-900/30 text-xs text-gray-500 dark:text-gray-400 flex items-center justify-between">
          <span>{filteredRows.length} {filteredRows.length === 1 ? 'linha' : 'linhas'}</span>
          <span className="inline-flex items-center gap-1.5">
            Resultado líquido:
            <strong className={`tabular-nums ${summary.totalProfit >= 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-600 dark:text-red-400'}`}>
              {summary.totalProfit >= 0 ? '+' : '−'}{formatBRL(Math.abs(summary.totalProfit))}
            </strong>
          </span>
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════════
   GLOBAL FEEDBACK — Toast + Confirm Dialog (mirrors useNotification/useDialog)
   ═══════════════════════════════════════════════════════════════════════ */
const FeedbackHost = () => {
  const [toast, setToast] = useState(null);
  const [confirm, setConfirm] = useState(null);

  useEffect(() => {
    window.__toast = (t) => {
      setToast(t);
      setTimeout(() => setToast(null), 3200);
    };
    window.__confirm = (c) => setConfirm(c);
  }, []);

  return (
    <>
      {toast && (
        <div className="fixed top-6 right-6 z-[60] animate-slide-up">
          <div className={`flex items-center gap-3 px-4 py-3 rounded-xl shadow-xl border min-w-[280px]
            ${toast.kind === 'success'
              ? 'bg-emerald-50 dark:bg-emerald-500/10 border-emerald-200 dark:border-emerald-500/30 text-emerald-800 dark:text-emerald-200'
              : 'bg-red-50 dark:bg-red-500/10 border-red-200 dark:border-red-500/30 text-red-800 dark:text-red-200'}`}>
            <Icon name={toast.kind === 'success' ? 'check-circle' : 'alert-triangle'} className="w-5 h-5"/>
            <span className="text-sm font-medium">{toast.msg}</span>
          </div>
        </div>
      )}

      {confirm && (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[55] flex items-center justify-center p-4 animate-fade-in"
             onClick={() => setConfirm(null)}>
          <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl max-w-md w-full animate-scale-in" onClick={(e) => e.stopPropagation()}>
            <div className="p-6">
              <div className="flex items-start gap-4">
                <div className="w-10 h-10 rounded-xl bg-red-500/10 text-red-600 dark:text-red-400 flex items-center justify-center shrink-0">
                  <Icon name="alert-triangle" className="w-5 h-5"/>
                </div>
                <div>
                  <h3 className="text-base font-semibold text-gray-900 dark:text-gray-100">{confirm.title}</h3>
                  <p className="text-sm text-gray-600 dark:text-gray-400 mt-1">{confirm.message}</p>
                </div>
              </div>
            </div>
            <div className="px-6 py-4 bg-slate-50 dark:bg-gray-900/50 border-t border-gray-100 dark:border-gray-700 rounded-b-2xl flex justify-end gap-3">
              <GhostButton onClick={() => setConfirm(null)}>Cancelar</GhostButton>
              <button onClick={() => { confirm.onConfirm(); setConfirm(null); }}
                className="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold text-white
                  bg-gradient-to-r from-red-600 to-rose-600 hover:from-red-700 hover:to-rose-700
                  shadow-md shadow-red-500/25 hover:shadow-lg hover:shadow-red-500/30 active:scale-[.98] transition-all">
                <Icon name="trash-2" className="w-4 h-4"/> {confirm.confirmText || 'Excluir'}
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
};

/* ════════════════════════════════════════════════════════════════════════
   TELA 1 — Dashboard wrapper (Exames)
   ═══════════════════════════════════════════════════════════════════════ */
const ExamsScreen = () => {
  const { exams, loading, addExam, updateExam, deleteExam } = useCostControl();
  const { showSuccess } = useNotification();
  const { showConfirmDialog } = useDialog();

  const [search, setSearch] = useState('');
  const [location, setLocation] = useState('all');
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);

  const locations = useMemo(() => Array.from(new Set(exams.map(e => e.location))), [exams]);
  const filtered = exams.filter(e => {
    const q = search.toLowerCase();
    const matches = !q || e.name.toLowerCase().includes(q) || e.code.toLowerCase().includes(q);
    const matchesLoc = location === 'all' || e.location === location;
    return matches && matchesLoc;
  });

  // Stats
  const stats = useMemo(() => {
    const totalCost = exams.reduce((s, e) => s + e.direct + e.indirect, 0);
    const avgCost = exams.length ? totalCost / exams.length : 0;
    return { count: exams.length, totalCost, avgCost };
  }, [exams]);

  const handleSave = (form) => {
    if (editing) {
      updateExam(editing.id, form);
      showSuccess('Exame atualizado com sucesso!');
    } else {
      addExam(form);
      showSuccess('Exame cadastrado com sucesso!');
    }
    setModalOpen(false); setEditing(null);
  };

  const handleDelete = (exam) => {
    showConfirmDialog({
      title: 'Excluir exame',
      message: `Tem certeza que deseja excluir "${exam.name}"? Esta ação não pode ser desfeita.`,
      confirmText: 'Excluir',
      onConfirm: () => { deleteExam(exam.id); showSuccess('Exame excluído com sucesso!'); },
    });
  };

  if (loading) {
    return (
      <div className="rounded-2xl border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-800 p-12 text-center text-sm text-gray-500">
        Carregando exames…
      </div>
    );
  }

  return (
    <div className="space-y-5">
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
        <StatCard icon="flask-conical"  label="Exames cadastrados" value={stats.count}                   sub="No catálogo" tone="blue"/>
        <StatCard icon="dollar-sign"    label="Custo total da carteira" value={formatBRL(stats.totalCost)} sub="Soma de todos os exames" tone="amber"/>
        <StatCard icon="bar-chart-3"    label="Custo médio por exame" value={formatBRL(stats.avgCost)}    sub="Direto + indireto" tone="green"/>
      </div>

      {/* Toolbar */}
      <div className="rounded-2xl border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-800 p-4 shadow-sm">
        <div className="flex flex-col lg:flex-row lg:items-center gap-3">
          <CostFilters search={search} setSearch={setSearch} location={location} setLocation={setLocation} locations={locations}/>
          <div className="flex flex-wrap items-center gap-2">
            <GhostButton icon="download">Exportar (Excel)</GhostButton>
            <GhostButton icon="upload">Importar (Excel)</GhostButton>
            <PrimaryButton icon="plus" onClick={() => { setEditing(null); setModalOpen(true); }}>Novo exame</PrimaryButton>
          </div>
        </div>
      </div>

      <ExamTable
        exams={filtered}
        onEdit={(e) => { setEditing(e); setModalOpen(true); }}
        onDelete={handleDelete}
      />

      <ExamFormModal
        open={modalOpen}
        exam={editing}
        onClose={() => { setModalOpen(false); setEditing(null); }}
        onSave={handleSave}
      />
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════════
   ROOT
   ═══════════════════════════════════════════════════════════════════════ */
const App = () => {
  const [tab, setTab] = useState('exams');
  const cc = useCostControl();

  return (
    <div className="min-h-screen bg-slate-50 dark:bg-gray-900">
      <Sidebar active="cost" onNav={() => {}}/>
      <div className="lg:pl-64">
        <Topbar tab={tab} onTab={setTab}/>
        <main className="px-4 sm:px-6 lg:px-8 py-6">
          <div className="animate-slide-up">
            {tab === 'exams'     && <ExamsScreen/>}
            {tab === 'payors'    && <PayorsScreen payors={cc.payors} exams={cc.exams}/>}
            {tab === 'analytics' && <AnalyticsScreen exams={cc.exams} payors={cc.payors}/>}
          </div>
        </main>
      </div>
      <FeedbackHost/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
