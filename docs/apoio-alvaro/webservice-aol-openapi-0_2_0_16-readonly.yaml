      responses:
        '200':
          description: |
            Retorno de resultados.

            ---

            ⚠️ **Atenção: interpretação correta do resultado por tipo de exame**

            **Exames simples e compostos**
            Cada `<resultado>` corresponde a uma única linha de resultado. O atributo `id_lis` pode ser usado pelo LIS como chave de identificação do resultado.

            **Exames de curva, cultura e múltiplas amostras**
            A linha de resultado (`linharesultado`) **se repete** para cada amostra coletada. Nestes casos, **o `id_lis` não deve ser usado como chave**, pois causará sobrescrita de resultados ou retornará apenas o resultado da primeira linha. A chave correta é a combinação dos atributos `amostra` + `linharesultado`.

            | Tipo de exame | Chave correta para o LIS |
            |---|---|
            | Simples / Composto / Paternidade | `id_lis` ou `linharesultado` |
            | Curva / Cultura / Múltiplas amostras | `amostra` + `linharesultado` |

            **Sobre o atributo `id_lis`**
            É um apelido alfanumérico definido pelo LIS do cliente e enviado no atributo `idlis` da solicitação (`<exame codigo="TSH" idlis="TSH1"/>`).
            O AOL devolve esse valor no atributo `id_lis` do resultado (`<resultado id_lis="TSH1" .../>`).
            Para exames de curva, cultura e múltiplas amostras, mesmo que o cliente faça o mapeamento do `idlis` com o mnemônico Alvaro, **a forma correta de receber estes resultados é pelo atributo `amostra`**, e não pelo `id_lis`.

            **Sobre cultura positiva**
            Quando o resultado de cultura for positivo, o response incluirá adicionalmente um bloco `<antibiograma>` com os antibióticos testados e suas respectivas resistências.
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/XmlAny'
              examples:
                resultadoComAnexoPNG:
                  summary: Response de resultados com anexo formato PNG
                  value: |
