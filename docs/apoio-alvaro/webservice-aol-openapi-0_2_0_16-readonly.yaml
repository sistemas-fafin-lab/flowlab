openapi: 3.1.0
info:
  title: Webservice AOL
  version: 0.2.0.16
  description: |
    Este Web Service tem por objetivo disponibilizar recursos de integração entre o serviço
    de apoio laboratorial Alvaro e sistemas LIS (Laboratory Information System) externos,
    sem a necessidade de utilização direta do AOL.

    Segue o padrão REST, utilizando os métodos HTTP POST, PUT, GET e DELETE para mapear as
    operações de integração laboratorial — incluindo inclusão e gestão de solicitações,
    consulta de resultados, rastreabilidade de amostras e exames, e sincronização de status.

    A troca de mensagens utiliza predominantemente XML no corpo das requisições e respostas,
    com autenticação via Basic Auth. Endpoints de rastreabilidade retornam JSON.

    **Ajustes finos de regra podem ser evoluídos incrementalmente.**

    > Para o catálogo completo de mensagens de retorno do sistema, consulte o endpoint
    > `GET /catalogoMensagens` na seção **mensagens-retorno**.

    ## Códigos de Resposta

    | Código | Descrição |
    |--------|-----------|
    | 200 | Sucesso, todos os dados enviados foram atualizados |
    | 206 | Valores atualizados parcialmente, alguns com sucesso e outros com falha |
    | 400 | Informações inválidas, falha ao atualizar todas as informações |
    | 401 | Credenciais inválidas ou ausentes (Basic Auth) |
    | 403 | Agente ou entidade não autorizados |
    | 500 | Falha interna, acionar suporte DASA |
servers:
- url: http://webservice.alvaro.com.br
  description: Produção
security:
- basicAuth: []
tags:
- name: mensagens-retorno
  description: Referência completa das mensagens de retorno do sistema.
- name: solicitacoes
  description: Fluxo principal de criação e atualização da solicitação.
- name: resultados
  description: Consultas e extrações de resultados em diferentes formatos.
- name: exames
  description: Inclusão e exclusão de exames.
- name: status
  description: Status de exames e visão consolidada.
- name: materiais
  description: Materiais aceitos por exame.
- name: amostras
  description: Situação da amostra.
- name: recoleta
  description: Consulta de notificações de recoleta por período.
- name: criticas
  description: Catálogo de críticas e metadados de exames. ⚠️ As críticas apresentadas nesta versão do YAML têm validade até 31/05/2026.
- name: conectividade-ws
  description: Saúde e utilitários de integração.
x-tagGroups:
- name: 1. Solicitação
  tags:
  - solicitacoes
  - exames
- name: 2. Resultados
  tags:
  - resultados
  - status
- name: 3. Apoio
  tags:
  - materiais
  - amostras
  - recoleta
  - criticas
  - conectividade-ws
paths:
  /webserviceaol/rest/producao/teste:
    get:
      tags:
      - conectividade-ws
      summary: 1) Teste de conexão
      operationId: testeConexao
      description: |
        Verifica a conectividade com o Web Service e retorna a versão atual do serviço.
        Não requer autenticação.

        Exemplo cURL:
        `curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/teste'`
      security: []
      responses:
        '200':
          description: Serviço disponível. Retorna a versão atual do Web Service.
          content:
            text/html:
              schema:
                type: string
              examples:
                versao:
                  summary: Versão atual do serviço
                  value: OK v2026.2.4
  /webserviceaol/rest/producao:
    put:
      tags:
      - solicitacoes
      summary: 2) Incluir solicitação (simples, composto, curva, paternidade, cultura, multiplas amostras)
      operationId: incluirSolicitacao
      security: []
      description: |
        Autenticação: as credenciais são informadas diretamente nos atributos do XML
        (`idagente` e `senha`), não via header HTTP. Exemplo: `<solicitacoes idagente="194607" senha="71da7e" ...>`.

        Regra de impressão de etiqueta: quando o atributo `nomeSocial` do paciente
        for informado, ele deve ser priorizado como nome impresso na etiqueta.

        Exemplos cURL:

        **Exame simples:**
        `curl --location --request PUT 'http://webservice.alvaro.com.br/webserviceaol/rest/producao' --header 'Content-Type: application/xml' --data '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><solicitacoes datahora="2026-03-03T08:39:37.402-03:00" idagente="194607" lis="NOME-LIS" operador="NOME-OPERADOR" senha="71da7e" versao="20170918"><entidade chave="31fc39645210bb80" codigo="19812"><pacientes><paciente codigolis="PAC-5000" datanasc="1991-01-01" nome="TESTE EXAME SIMPLES" nomeSocial="TESTE NOME SOCIAL" sexo="M" cpf="04056521000" email="paciente@exames.com"/></pacientes><medicos><medico crm="123456789-RJ" nome="Médico Teste"/></medicos><solicitacao codigolis="SOL-5000" codigopaciente="PAC-5000" crm="123456789-RJ" data="2026-03-03-03:00" dataColeta="2026-03-03T00:00:00.000-03:00" postoDeColeta="POSTO_01"><amostra descricao="Basal" codigoBarras="" material="543"><exame codigo="TSH" dadosadicionais="" urgente="false"/></amostra></solicitacao></entidade></solicitacoes>'`

