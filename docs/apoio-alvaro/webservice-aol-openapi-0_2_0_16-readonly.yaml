  /webserviceaol/rest/producao/v1/notificacao/{idEntidade}:
    get:
      tags:
      - recoleta
      summary: 13) Recoleta por período
      operationId: listarRecoletaPorPeriodo
      description: |
        Retorna a lista de notificações de recoleta de uma entidade em um intervalo de datas.
        Os parâmetros `dataInicial` e `dataFinal` devem ser informados no formato
        `YYYY-MM-DD HH:MM:SS` (URL-encoded: espaço → `%20`, `:` → `%3A`).

        Exemplo cURL:
        `curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/v1/notificacao/28447?dataInicial=2026-02-12%2000%3A00%3A00&dataFinal=2026-02-26%2023%3A59%3A59' --header 'Authorization: Basic MTkzODAzOjg1YTZiMA=='`
      parameters:
      - name: idEntidade
        in: path
        required: true
        schema:
          type: string
          examples:
          - '28447'
        description: Código da entidade.
      - name: dataInicial
        in: query
        required: true
        schema:
          type: string
          examples:
          - '2026-02-12 00:00:00'
        description: Data e hora inicial do filtro (YYYY-MM-DD HH:MM:SS, URL-encoded).
      - name: dataFinal
        in: query
        required: true
        schema:
          type: string
          examples:
          - '2026-02-26 23:59:59'
        description: Data e hora final do filtro (YYYY-MM-DD HH:MM:SS, URL-encoded).
      responses:
        '200':
          description: Lista de notificações de recoleta no período informado.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecoletaNotificacao'
              examples:
                recoletaPorPeriodo:
                  summary: Response de recoleta por período
                  value:
                  - idAlvaro: 370518580
                    os_lis: '45552462'
                    motivo: Nova amostra para confirmacao de resultado
                    data: '2026-02-12'
                    amostras:
                    - id: '702707390186'
                      exames:
                      - COBRE
                    tipo: RECOLETA
                  - idAlvaro: 370518698
                    os_lis: '45552463'
                    motivo: Amostra inadequada (Material insuficiente)
                    data: '2026-02-12'
                    amostras:
                    - id: '702707390223'
                      exames:
                      - ZN
                    tipo: RECOLETA
                  - idAlvaro: 370518990
                    os_lis: '45552464'
                    motivo: Nova amostra para confirmacao de resultado
                    data: '2026-02-12'
                    amostras:
                    - id: '702707390254'
                      exames:
                      - ZN
                    tipo: RECOLETA
        '400':
          description: Parâmetros inválidos (formato de data incorreto, dataInicial > dataFinal)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
