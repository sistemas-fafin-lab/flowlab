  /webserviceaol/rest/producao/v2/resultados/pdf:
    get:
      tags:
      - resultados
      summary: 9) Resultado PDF
      operationId: listarResultadosPdf
      description: Retorna o binário do PDF do laudo da ordem de serviço informada.
      parameters:
      - name: idOrdemServico
        in: query
        required: true
        schema:
          type: string
      - name: idEntidade
        in: query
        required: true
        schema:
          type: string
      - name: exames
        in: query
        required: false
        description: |
          Parâmetro não obrigatório para informar os exames que retornarão no laudo PDF.
          Para buscar mais de um exame, utilizar o caractere vírgula (",") como separador.
          Exemplo com múltiplos exames: `exames=T3,T4L,CARIB`
        schema:
          type: string
        x-scenarios:
          porOS:
            query: idOrdemServico=372106818&idEntidade=19812
            curl: |
              curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/v2/resultados/pdf?idOrdemServico=372106818&idEntidade=19812' --header 'Authorization: Basic MTk0NjA3OjcxZGE3ZQ=='
          porExame:
            query: idOrdemServico=372106818&idEntidade=19812&exames=TSH
            curl: |
              curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/v2/resultados/pdf?idOrdemServico=372106818&idEntidade=19812&exames=TSH' --header 'Authorization: Basic MTk0NjA3OjcxZGE3ZQ=='
      - name: logo
        in: query
        schema:
          type: boolean
          default: true
      - name: assinatura
        in: query
        schema:
          type: boolean
          default: true
      responses:
        '200':
          description: Binário do PDF do laudo. O conteúdo retornado é o arquivo PDF em formato binário.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
  /webserviceaol/rest/producao/v3/resultados/lote/{idEntidade}/{dataInicial}/{dataFinal}:
    get:
      tags:
      - resultados
      summary: 10) Resultado lote v3
      operationId: listarResultadosLoteV3
      description: |
        Retorna resultados de exames por lote em um período informado.

        Parâmetro `exportado` (query, opcional):
        - Ausente: devolve resultados exportados e não exportados
        - `exportado=true`: devolve resultados exportados e não exportados no período informado
        - `exportado=false`: devolve **apenas** resultados não exportados no período informado

        Exemplo de URLs:
        `GET http://webservice.alvaro.com.br/webserviceaol/rest/producao/v3/resultados/lote/19812/20260303000000/20260303235959`
        `GET http://webservice.alvaro.com.br/webserviceaol/rest/producao/v3/resultados/lote/19812/20260303000000/20260303235959?exportado=true`
        `GET http://webservice.alvaro.com.br/webserviceaol/rest/producao/v3/resultados/lote/19812/20260303000000/20260303235959?exportado=false`

        Exemplo cURL:
        `curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/v3/resultados/lote/19812/20260303000000/20260303235959' --header 'Authorization: Basic MTk0NjA3OjcxZGE3ZQ=='`
      parameters:
      - name: idEntidade
        in: path
        required: true
        schema:
          type: string
          examples:
          - '19812'
        description: Código da entidade.
      - name: dataInicial
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9]{14}$
          examples:
          - '20260303000000'
        description: 'Data inicial no formato YYYYMMDDHHmmss (ex: 20260303000000).'
      - name: dataFinal
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9]{14}$
          examples:
          - '20260303235959'
        description: 'Data final no formato YYYYMMDDHHmmss (ex: 20260303235959).'
      - name: exportado
        in: query
        required: false
        schema:
          type: boolean
        description: |
          Filtro por status de exportação. Se ausente, devolve exportados e não exportados. `true` = exportados e não exportados. `false` = apenas não exportados.
      - name: habilitaLocalCNES
        in: query
        required: false
        schema:
          type: boolean
        description: |
          Quando `true`, habilita o retorno do bloco `local-cnes` no resultado, contendo informações
          sobre o local de execução do exame com o código CNES (Cadastro Nacional de Estabelecimentos de Saúde).

          Exemplo de URL com parâmetro:
          `GET http://webservice.alvaro.com.br/webserviceaol/rest/producao/v3/resultados/lote/19812/20260303122000/20260303122500?habilitaLocalCNES=true`

          Exemplo cURL:
          `curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/v3/resultados/lote/19812/20260303122000/20260303122500?habilitaLocalCNES=true' --header 'Authorization: Basic MTk0NjA3OjcxZGE3ZQ=='`
        examples:
          habilitado:
            summary: Retorna local-CNES no resultado por lote
            value: true
      responses:
        '200':
          description: Resultados por lote v3
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/XmlAny'
              examples:
                resultadosLoteV3:
