      description: |
        Retorna a situação atual de uma amostra pelo código de barras.
        Autenticação via headers `idagente` e `senha` (não Basic Auth).

        Exemplo cURL:
        `curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/situacaoAmostra/702968003078' --header 'idagente: 169396' --header 'senha: 2CACA6' --header 'Authorization: Basic MTk0NjA3OjcxZGE3ZQ=='`
      security:
      - idAgenteHeader: []
        senhaHeader: []
      parameters:
      - name: codigoBarras
        in: query
        required: true
        schema:
          type: string
          examples:
          - '702968003078'
        description: 'Código de barras da amostra (ex: 702968003078)'
      responses:
        '200':
          description: Situação da amostra
          content:
