  /webserviceaol/rest/producao/catalogoMensagens:
    get:
      tags:
      - mensagens-retorno
      summary: Catálogo de mensagens de retorno do sistema
      operationId: catalogoMensagens
      x-internal: true
      security: []
      description: |
        Referência completa das mensagens de retorno de negócio do WebService AOL Alvaro.
        Este endpoint é exclusivamente documental e não representa uma rota real do servidor.

        ## Mensagens de Retorno de Negócio

        | Categoria | Mensagem | Descrição |
        |-----------|----------|-----------|
        | ACESSO | ID ou Senha incorreta | Dados de autenticação do laboratório estão divergentes da base de dados Álvaro. |
        | ACESSO | Agente ou Entidade não autorizado a utilizar o WebService | Agente e/ou Entidade não estão liberados para utilizar o webservice. |
        | ACESSO | Entidade ou Agente inválido | Entidade não liberada para utilizar o serviço. |
        | ACESSO | Agente e senha são obrigatórios | Agente e/ou senha não informados na requisição. |
        | ENTIDADE | Entidade não atendida pelo agente | Agente enviado na requisição não confere com o associado na base de dados Álvaro. |
        | ENTIDADE | Entidade não autorizada à enviar para São Paulo | Entidade não possui permissão para envio de exames para São Paulo. |
        | ENTIDADE | Entidade inválida | Entidade não localizada na base de dados Álvaro. |
        | SOLICITACAO | Solicitação não cadastrada | Solicitação não localizada na base de dados Álvaro. |
        | SOLICITACAO | Solicitação já processada | Solicitação já foi processada em produção. |
        | SOLICITACAO | Material ou identificação da amostra não encontrado | Não foi encontrado identificador e/ou material na amostra informada. |
        | SOLICITACAO | OS não inserida | Verifique os campos enviados. |
        | SOLICITACAO | OS não inserida por duplicidade de exame | Foram enviadas repetições do mesmo exame na solicitação. |
        | SOLICITACAO | Amostras com tempo duplicado | O sistema não permite envio do mesmo tempo de curva por solicitação. |
        | EXAME | Exame não existe na solicitação | Exame não localizado na solicitação informada. |
        | EXAME | Exame excluído com sucesso | O exame foi removido da solicitação. |
        | EXAME | Exame incluído com sucesso | O exame foi inserido na solicitação. |
        | EXAME | Exame exclusivo em amostra existente | Não é possível inserir exame exclusivo em uma amostra já existente. |
        | EXAME | Exame inválido não autorizado | Entidade não tem autorização para envio do exame. |
        | EXAME | Exame já existente na amostra | O exame informado já está presente na amostra. |
        | MATERIAL | Material inválido | Material informado não existe na base de dados ou é incompatível com o exame. |
        | AMOSTRA | Amostra possui exame inválido | Exame informado não existe na base de dados ou é incompatível com material. |
        | RESULTADO | Ordem de serviço sem resultados | A OS informada ainda não possui resultados disponíveis. |
        | RESULTADO | OS ou exame não encontrado | Não foi possível localizar a ordem de serviço ou exame informado. |
        | GERAL | Erro na geração do XML de saída | Falha interna no processamento do sistema. |
        | GERAL | Erro na validação do XML de entrada | Protocolo XML divergente do esperado. |
        | GERAL | Não foi possível inserir exame/amostra | Verifique os campos da solicitação. |
      responses:
        '200':
          description: Catálogo de mensagens de retorno (endpoint documental).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessMessage'
