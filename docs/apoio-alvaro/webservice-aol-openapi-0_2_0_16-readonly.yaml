      description: |
        Exemplo de chamada (valores utilizados apenas para teste):
        `DELETE /v2/19812/372099609/707825579338/EPF1`

        Formato do endpoint com os campos que devem ser preenchidos:
        `DELETE /v2/{entidade}/{solicitacao}/{codigoBarras}/{codigoExame}`

        Onde:
        - `{entidade}` → código da entidade (ex: 19812)
        - `{solicitacao}` → ID da solicitação no Alvaro (ex: 372099609)
        - `{codigoBarras}` → código de barras da amostra (ex: 707825579338)
        - `{codigoExame}` → código do exame a excluir (ex: EPF1)

        Exemplo cURL:
        `curl --location --request DELETE 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/v2/19812/372099609/707825579338/EPF1' --header 'Content-Type: application/xml' --header 'Authorization: Basic MTk0NjA3OjcxZGE3ZQ=='`
      parameters:
      - name: entidade
        in: path
        required: true
        schema:
          type: string
          examples:
          - '19812'
      - name: solicitacao
        in: path
        required: true
        schema:
          type: string
          examples:
          - '372099609'
      - name: codigoBarras
        in: path
        required: true
        schema:
          type: string
          examples:
          - '707825579338'
      - name: codigoExame
        in: path
        required: true
        schema:
          type: string
