  /webserviceaol/rest/producao/v1/orders/status/{idEntidade}:
    get:
      tags:
      - status
      summary: 12) Status consolidado
      operationId: listarStatusConsolidado
      description: |
        Retorna contagem por status (countStatus), lista de orders com suas amostras e exames,
        cursor para paginação (nextCursor) e flag hasNext. O parâmetro `idEntidade` é passado
        no path da URL. Se o parâmetro `status` não for informado, a busca será por período
        entre `dataInicial` e `dataFinal`.

        Exemplo de chamadas:
        `GET /v1/orders/status/19812?dataInicial=2026-02-01&dataFinal=2026-02-10`
        `GET /v1/orders/status/19812?dataInicial=2026-02-01&dataFinal=2026-02-10&status=FINALIZADO`

        Exemplo cURL (busca por período):
        `curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/v1/orders/status/19812?dataInicial=2026-02-01&dataFinal=2026-02-10' --header 'Authorization: Basic MTk0NjA3OjcxZGE3ZQ=='`

        Exemplo cURL (busca por status específico):
        `curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/v1/orders/status/19812?dataInicial=2026-02-01&dataFinal=2026-02-10&status=FINALIZADO' --header 'Authorization: Basic MTk0NjA3OjcxZGE3ZQ=='`

        Exemplo cURL (com paginação):
        `curl --location 'http://webservice.alvaro.com.br/webserviceaol/rest/producao/v1/orders/status/19812?dataInicial=2026-02-01&dataFinal=2026-02-10&nextCursor=MjAyNi0wMi0wM1QxMzo1OTozNy44NDBafDY5ODFmZjQ5YzJiMzI3NjExZWQ5YWY1MA' --header 'Authorization: Basic MTk0NjA3OjcxZGE3ZQ=='`
      parameters:
      - name: idEntidade
        in: path
        required: true
        schema:
          type: string
          examples:
          - '19812'
        description: Código da entidade.
      - name: dataInicial
        in: query
        required: true
        schema:
          type: string
          format: date
          examples:
          - '2026-02-01'
        description: Data inicial do filtro (YYYY-MM-DD).
      - name: dataFinal
        in: query
        required: true
        schema:
          type: string
          format: date
          examples:
          - '2026-02-10'
        description: Data final do filtro (YYYY-MM-DD).
      - name: status
        in: query
        required: false
        schema:
          type: string
        description: |
          Filtro opcional por status final (ex: CADASTRADO, EM_EXECUCAO, AMOSTRA_OBTIDA). Se ausente, usa o período informado.
      - name: nextCursor
        in: query
        required: false
        schema:
          type: string
        description: Cursor para paginação. Na primeira busca enviar vazio ou omitir.
      responses:
